services:
  - type: web
    name: doctor-booking-backend
    env: node
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && node server.js
    envVars:
      - key: PORT
        value: 5001
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        fromConfig: true
      - key: SUPABASE_SERVICE_ROLE_KEY
        fromConfig: true
      - key: RAZORPAY_KEY_ID
        fromConfig: true
      - key: RAZORPAY_KEY_SECRET
        fromConfig: true

  - type: web
    name: doctor-booking-frontend
    env: static
    plan: free
    buildCommand: cd client && npm install && npm run build
    staticPublishDirectory: client/dist
    envVars:
      - key: VITE_SUPABASE_URL
        fromConfig: true
      - key: VITE_SUPABASE_ANON_KEY
        fromConfig: true
      - key: VITE_API_URL
        fromConfig: true
      - key: VITE_RAZORPAY_KEY_ID
        fromConfig: true
      - key: VITE_RAZORPAY_KEY_SECRET
        fromConfig: true
